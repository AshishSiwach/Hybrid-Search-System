# Hybrid Search & Reranking Configuration

models:
  dense_encoder:
    name: "all-MiniLM-L6-v2"
    device: "cpu"        # swap to "cuda" if GPU available
    batch_size: 32

  cross_encoder:
    name: "cross-encoder/ms-marco-MiniLM-L-6-v2"
    device: "cpu"
    batch_size: 16

retrieval:
  bm25:
    top_k: 50
    b: 0.75
    k1: 1.2

  dense:
    top_k: 50
    similarity_metric: "cosine"
    # FAISS HNSW parameters
    # hnsw_m: neighbours per node — higher = better recall, more RAM (default 32)
    # hnsw_ef_search: search beam width — higher = better recall, slower (default 64)
    hnsw_m: 32
    hnsw_ef_search: 64

  fusion:
    method: "reciprocal_rank_fusion"
    top_k: 50
    rrf_k: 60

  reranking:
    top_k: 10
    batch_size: 16

evaluation:
  metrics:
    - "map@5"
    - "map@10"
    - "ndcg@10"
    - "mrr"
    - "precision@5"
    - "recall@10"

  # Queries used per evaluation pass.
  # General pass  : up to test_queries from the full random sample
  # Climate pass  : up to test_queries from climate-tagged subset
  test_queries: 200

data:
  # MS MARCO random sample (primary) — generated by dataset_builder.py
  ms_marco_passages_path: "data/ms_marco_passages.json"
  ms_marco_queries_path:  "data/ms_marco_queries.json"

  # Climate documents CSV (secondary / fallback)
  csv_path:       "data/updated_climate_documents_with_files.csv"
  documents_path: "data/climate_documents.json"

  # Shared caches (rebuilt automatically if missing)
  embeddings_path:       "data/doc_embeddings.npy"
  faiss_index_path:      "data/faiss_hnsw.index"
  index_path:            "data/bm25_index.pkl"
  relevance_labels_path: "data/relevance_labels.json"

# dataset_builder.py settings
dataset_builder:
  split:       "train"
  max_queries: 10000    # ~100k passages; use 100000 for full dataset
  seed:        42
  output_dir:  "data"

logging:
  level:  "INFO"
  format: "%(asctime)s - %(name)s - %(levelname)s - %(message)s"
  file:   "results/experiment.log"

experiment:
  name:             "hybrid_search_ms_marco"
  results_dir:      "results"
  save_predictions: true
  save_metrics:     true
